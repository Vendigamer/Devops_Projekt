name: Fullstack Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/vargavendel/vargavendel-backend:${{ env.IMAGE_TAG }}
            ghcr.io/vargavendel/vargavendel-backend:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/vargavendel/vargavendel-frontend:${{ env.IMAGE_TAG }}
            ghcr.io/vargavendel/vargavendel-frontend:latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.32.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy Backend
        run: |
          export IMAGE_TAG=${{ env.IMAGE_TAG }}
          envsubst '$IMAGE_TAG' < backend/deployment.yaml | kubectl apply -f -

      - name: Deploy Frontend
        run: |
          export IMAGE_TAG=${{ env.IMAGE_TAG }}
          envsubst '$IMAGE_TAG' < frontend/deployment.yaml | kubectl apply -f -

      - name: Cleanup old frontend images
        continue-on-error: true
        uses: actions/delete-package-versions@v5
        with:
          package-name: vargavendel-frontend
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: true

      - name: Cleanup old backend images
        continue-on-error: true
        uses: actions/delete-package-versions@v5
        with:
          package-name: vargavendel-backend
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: true
