apiVersion: apps/v1
kind: Deployment
metadata:
  name: vargavendel-frontend-deployment
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: vargavendel-frontend
  template:
    metadata:
      labels:
        app: vargavendel-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-login-secret
      containers:
        - name: vargavendel-frontend
          image: ghcr.io/vargavendel/vargavendel-frontend:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: vargavendel-frontend-cluster-ip-service
spec:
  selector:
    app: vargavendel-frontend
  type: ClusterIP
  ports:
    - protocol: TCP
      targetPort: 80
      port: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vargavendel-frontend-certificate
spec:
  secretName: vargavendel-frontend-certificate
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - vargavendel.dev
    - www.vargavendel.dev
